<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Frontend structure</title>
  <desc id="desc">epweb Angular app folders, views, services, and shared utilities.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <linearGradient id="head" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#134e4a"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <style>
      .card { fill: white; stroke: #94a3b8; stroke-width: 2; rx: 18; ry: 18; }
      .head { fill: url(#head); rx: 18; ry: 18; }
      .label { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: white; }
      .title { font: 700 42px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 20px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .item { font: 600 22px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subitem { font: 400 18px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .pill { fill: #ccfbf1; stroke: #2dd4bf; stroke-width: 1.5; rx: 10; ry: 10; }
      .pill-text { font: 700 16px 'Segoe UI', Arial, sans-serif; fill: #0f766e; }
      .line { stroke: #64748b; stroke-width: 3; stroke-linecap: round; }
    </style>
  </defs>

  <rect width="1200" height="760" fill="url(#bg)" />
  <text x="60" y="70" class="title">epweb frontend structure</text>
  <text x="60" y="105" class="subtitle">Standalone Angular app with route-based screens and shared service layer for API communication.</text>

  <line x1="250" y1="180" x2="250" y2="670" class="line"/>
  <line x1="250" y1="240" x2="360" y2="240" class="line"/>
  <line x1="250" y1="385" x2="360" y2="385" class="line"/>
  <line x1="250" y1="540" x2="360" y2="540" class="line"/>

  <rect x="60" y="150" width="220" height="110" class="card"/>
  <rect x="60" y="150" width="220" height="42" class="head"/>
  <text x="85" y="179" class="label">src/app</text>
  <text x="85" y="218" class="item">bootstrap</text>
  <text x="85" y="244" class="subitem">app.ts, routes, config</text>

  <rect x="360" y="160" width="350" height="165" class="card"/>
  <rect x="360" y="160" width="350" height="42" class="head"/>
  <text x="385" y="189" class="label">feature components/</text>
  <text x="385" y="228" class="item">about, booking, consultation</text>
  <text x="385" y="256" class="subitem">home, login, register</text>
  <text x="385" y="284" class="subitem">staff, staffCard, verify-email</text>
  <rect x="385" y="294" width="128" height="28" class="pill"/>
  <text x="402" y="314" class="pill-text">screen folders</text>

  <rect x="760" y="160" width="360" height="165" class="card"/>
  <rect x="760" y="160" width="360" height="42" class="head"/>
  <text x="785" y="189" class="label">routing + guards</text>
  <text x="785" y="228" class="item">app.routes.ts</text>
  <text x="785" y="256" class="subitem">auth-guard.ts</text>
  <text x="785" y="284" class="subitem">public and protected flows</text>
  <rect x="785" y="294" width="124" height="28" class="pill"/>
  <text x="803" y="314" class="pill-text">navigation rules</text>

  <rect x="360" y="345" width="350" height="165" class="card"/>
  <rect x="360" y="345" width="350" height="42" class="head"/>
  <text x="385" y="374" class="label">shared/services</text>
  <text x="385" y="413" class="item">auth.service.ts</text>
  <text x="385" y="441" class="subitem">booking.service.ts</text>
  <text x="385" y="469" class="subitem">consultation.service.ts, staff.service.ts</text>
  <rect x="385" y="479" width="118" height="28" class="pill"/>
  <text x="404" y="499" class="pill-text">API clients</text>

  <rect x="760" y="345" width="360" height="165" class="card"/>
  <rect x="760" y="345" width="360" height="42" class="head"/>
  <text x="785" y="374" class="label">shared utilities</text>
  <text x="785" y="413" class="item">auth.interceptor.ts</text>
  <text x="785" y="441" class="subitem">interfaces/</text>
  <text x="785" y="469" class="subitem">request decoration and typing</text>
  <rect x="785" y="479" width="116" height="28" class="pill"/>
  <text x="804" y="499" class="pill-text">cross-cutting</text>

  <rect x="360" y="530" width="760" height="140" class="card"/>
  <rect x="360" y="530" width="760" height="42" class="head"/>
  <text x="385" y="559" class="label">presentation logic</text>
  <text x="385" y="598" class="item">Components render data, services talk to the backend, guard/interceptor enforce access.</text>
  <text x="385" y="628" class="subitem">This keeps UI concerns separate from API calls and auth concerns.</text>
</svg>
