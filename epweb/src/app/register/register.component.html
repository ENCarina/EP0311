<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
  <div class="card shadow p-4" style="width: 400px;">
    <h2 class="text-center mb-4">Regisztráció</h2>

    <div *ngIf="errorMessage" class="alert alert-danger p-2 small">
      {{ errorMessage }}
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label class="form-label">Teljes név</label>
        <input type="text" formControlName="name" class="form-control" 
        [class.is-invalid]="registerForm.get('name')?.invalid && registerForm.get('name')?.touched">
        <div class="invalid-feedback">Név megadása kötelező!</div>
      </div>

    <div class="mb-3">
      <label class="form-label">Email cím</label>
      <input type="email" formControlName="email" 
            class="form-control"
            [class.is-invalid]="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
      <div class="invalid-feedback">Érvényes email cím szükséges!</div>
    </div>

    <div class="mb-3">
      <label class="form-label">Jelszó</label>
      <input type="password" formControlName="password" 
            class="form-control"
            [class.is-invalid]="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
      <div class="invalid-feedback">Legalább 6 karakter hosszú jelszó kell!</div>
    </div>

    <div class="mb-3">
      <label class="form-label">Jelszó megerősítése</label>
      <input type="password" formControlName="ConfirmPassword" 
            class="form-control"
            [class.is-invalid]="registerForm.hasError('mismatch') && registerForm.get('ConfirmPassword')?.touched">
      <div class="invalid-feedback">A jelszavak nem egyeznek!</div>
    </div>

      <button type="submit" [disabled]="!registerForm.valid || isLoading" class="btn btn-primary w-100">
        <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
        Regisztrálok
      </button>

    </form>
  </div>
</div>
