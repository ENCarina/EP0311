<div class="register-wrapper d-flex justify-content-center align-items-center">
  <div class="col-12 col-md-8 col-lg-5 col-xl-4 px-3">
    <div class="card elite-card-register shadow-lg border-0">
      <div class="card-body p-4 p-md-5">
        
        <div class="text-center mb-4">
          <div class="icon-circle mb-3">
            <i class="bi bi-person-plus text-primary display-5"></i>
          </div>
          <h2 class="fw-bold h3">Fiók létrehozása</h2>
          <p class="text-muted small">Csatlakozzon az Elit Medical Centre közösségéhez.</p>
        </div>

        @if (errorMessage) {
          <div class="alert alert-danger py-2 mb-4 border-0 small text-center animate__animated animate__shakeX">
            <i class="bi bi-exclamation-circle me-2"></i> {{ errorMessage }}
          </div>
        }

        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
          <div class="mb-3">
            <label class="form-label small fw-semibold text-secondary">Teljes név</label>
            <input type="text" formControlName="name" class="form-control elite-input" 
                   placeholder="Minta Ádám/Éva"
                   [class.is-invalid]="registerForm.get('name')?.invalid && registerForm.get('name')?.touched">
            <div class="invalid-feedback">Név megadása kötelező!</div>
          </div>

          <div class="mb-3">
            <label class="form-label small fw-semibold text-secondary">Email cím</label>
            <input type="email" formControlName="email" class="form-control elite-input"
                   placeholder="pelda@email.hu"
                   [class.is-invalid]="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
            <div class="invalid-feedback">Érvényes email cím szükséges!</div>
          </div>

          <div class="mb-3">
            <label class="form-label small fw-semibold text-secondary">Jelszó</label>
            <input type="password" formControlName="password" class="form-control elite-input"
                   placeholder="••••••••"
                   [class.is-invalid]="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
            <div class="invalid-feedback">Legalább 6 karakter hosszú jelszó kell!</div>
          </div>

          <div class="mb-4">
            <label class="form-label small fw-semibold text-secondary">Jelszó megerősítése</label>
            <input type="password" formControlName="confirmPassword" class="form-control elite-input"
                   placeholder="••••••••"
                   [class.is-invalid]="registerForm.hasError('mismatch') && registerForm.get('confirmPassword')?.touched">
            <div class="invalid-feedback">
              <span *ngIf="registerForm.get('confirmPassword')?.hasError('required')">A megerősítés kötelező!</span>
              <span *ngIf="registerForm.hasError('mismatch') && !registerForm.get('confirmPassword')?.hasError('required')">A jelszavak nem egyeznek!</span>
            </div>
          </div>

          <button type="submit" [disabled]="!registerForm.valid || isLoading" class="btn btn-elite-submit w-100 py-3 shadow-sm">
            @if (isLoading) {
              <span class="spinner-border spinner-border-sm me-2"></span>
              Feldolgozás...
            } @else {
              <span class="fw-bold letter-spacing-1">REGISZTRÁLOK</span>
            }
          </button>
        </form>

        <div class="text-center mt-5">
          <p class="mb-0 small text-secondary">Már van fiókja?</p>
          <a routerLink="/login" class="login-link fw-bold text-decoration-none">
            Bejelentkezés <i class="bi bi-arrow-right ms-1"></i>
          </a>
        </div>
        
      </div>
    </div>
  </div>
</div>
