<div class="container mt-5 text-center">
  <div class="row justify-content-center">
    <div class="col-md-6 card shadow p-4">

      @if(loading) {
        <div class="py-4">
          <div class="spinner-border text-info mb-3" role="status">
            <span class="visually-hidden">Ellenőrzés...</span>
          </div>
          <p class="h4">Fiók aktiválása folyamatban...</p>
        </div>
      }

      @if(success) {
        <div class="alert alert-success py-4">
          <h2 class="alert-heading">Sikeres visszaigazolás!</h2>
          <p>Köszönjük! A regisztrációd mostantól aktív.</p>
          <hr>
          <button class="btn btn-success" routerLink="/login">Tovább a bejelentkezéshez</button>
        </div>
      }

      @if(error) {
        <div class="alert alert-danger py-4">
          <h2 class="alert-heading">Sikertelen aktiválás!</h2>
          <p>A megerősítő link érvénytelen vagy már lejárt.</p>
          <hr>
          <button class="btn btn-outline-danger" routerLink="/register">Új regisztráció</button>
        </div>
      }

    </div>
  </div>
</div>
